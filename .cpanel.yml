---
# cPanel Git™ deployment — runs when you deploy from cPanel (see docs below).
# Matches this repo layout: public/ → public_html, laravel/ → sibling ../laravel (see public/index.php).
# whoami = your cPanel account user when the hook runs.
deployment:
  tasks:
    - /bin/mkdir -p /home/$(whoami)/public_html /home/$(whoami)/laravel
    - /bin/rsync -a --delete --exclude 'vendor' --exclude 'node_modules' laravel/ /home/$(whoami)/laravel/
    - /bin/rsync -a --delete --exclude '.well-known' --exclude 'storage' public/ /home/$(whoami)/public_html/
    - cd /home/$(whoami)/laravel && (/opt/cpanel/composer/bin/composer install --no-dev --no-interaction || composer install --no-dev --no-interaction)
