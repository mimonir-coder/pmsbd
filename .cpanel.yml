---
deployment:
  tasks:
    - /bin/mkdir -p /home/pmsbdcom/public_html /home/pmsbdcom/laravel
    - /bin/rsync -a --delete --exclude 'vendor' --exclude 'node_modules' laravel/ /home/pmsbdcom/laravel/
    - /bin/rsync -a --delete --exclude '.well-known' --exclude 'storage' public/ /home/pmsbdcom/public_html/
    - cd /home/pmsbdcom/laravel && (/opt/cpanel/composer/bin/composer install --no-dev --no-interaction || composer install --no-dev --no-interaction)
